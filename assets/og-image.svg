<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="40%" stop-color="#2563eb"/>
      <stop offset="70%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="-60" cy="-60" r="380" fill="rgba(255,255,255,0.06)"/>
  <circle cx="1260" cy="690" r="340" fill="rgba(255,255,255,0.06)"/>
  <circle cx="900" cy="100" r="180" fill="rgba(255,255,255,0.04)"/>

  <!-- Japanese brand name -->
  <text x="80" y="228"
    font-family="Hiragino Kaku Gothic Pro, Hiragino Sans, YuGothic, Arial, sans-serif"
    font-size="100"
    font-weight="700"
    fill="white">セカトーク</text>

  <!-- XP badge -->
  <rect x="82" y="248" width="112" height="52" rx="10" fill="white"/>
  <text x="138" y="285"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-size="26"
    font-weight="800"
    fill="#2563eb"
    text-anchor="middle"
    letter-spacing="6">XP</text>

  <!-- Tagline -->
  <text x="80" y="370"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-size="32"
    font-weight="400"
    fill="rgba(255,255,255,0.88)">English pronunciation practice</text>
  <text x="80" y="416"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-size="32"
    font-weight="400"
    fill="rgba(255,255,255,0.88)">for Japanese university students</text>

  <!-- Divider -->
  <line x1="80" y1="456" x2="480" y2="456" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>

  <!-- Sub-tagline -->
  <text x="80" y="496"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-size="22"
    font-weight="400"
    fill="rgba(255,255,255,0.60)">AI-scored pronunciation  ·  Idioms &amp; slang  ·  Free to start</text>

  <!-- Right side: score preview card -->
  <rect x="780" y="120" width="340" height="390" rx="20" fill="rgba(255,255,255,0.12)"/>
  <rect x="780" y="120" width="340" height="390" rx="20" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>

  <text x="800" y="160"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-size="15"
    font-weight="600"
    fill="rgba(255,255,255,0.6)"
    letter-spacing="2">PRONUNCIATION SCORE</text>

  <!-- Overall score -->
  <text x="950" y="250"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-size="80"
    font-weight="800"
    fill="white"
    text-anchor="middle">87</text>
  <text x="950" y="280"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-size="16"
    fill="rgba(255,255,255,0.55)"
    text-anchor="middle">overall</text>

  <!-- Score bars -->
  <text x="800" y="316" font-family="Helvetica Neue, Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)">Accuracy</text>
  <rect x="800" y="322" width="240" height="8" rx="4" fill="rgba(255,255,255,0.15)"/>
  <rect x="800" y="322" width="206" height="8" rx="4" fill="#34d399"/>

  <text x="800" y="350" font-family="Helvetica Neue, Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)">Fluency</text>
  <rect x="800" y="356" width="240" height="8" rx="4" fill="rgba(255,255,255,0.15)"/>
  <rect x="800" y="356" width="182" height="8" rx="4" fill="#60a5fa"/>

  <text x="800" y="384" font-family="Helvetica Neue, Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)">Prosody</text>
  <rect x="800" y="390" width="240" height="8" rx="4" fill="rgba(255,255,255,0.15)"/>
  <rect x="800" y="390" width="158" height="8" rx="4" fill="#c084fc"/>

  <!-- Word chips -->
  <rect x="800" y="428" width="76" height="30" rx="8" fill="rgba(16,185,129,0.25)"/>
  <text x="838" y="448" font-family="Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="600" fill="#34d399" text-anchor="middle">speak</text>

  <rect x="884" y="428" width="56" height="30" rx="8" fill="rgba(16,185,129,0.25)"/>
  <text x="912" y="448" font-family="Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="600" fill="#34d399" text-anchor="middle">with</text>

  <rect x="948" y="428" width="88" height="30" rx="8" fill="rgba(245,158,11,0.3)"/>
  <text x="992" y="448" font-family="Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="600" fill="#fbbf24" text-anchor="middle">con·fi</text>

  <rect x="800" y="466" width="106" height="30" rx="8" fill="rgba(239,68,68,0.25)"/>
  <text x="853" y="486" font-family="Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="600" fill="#f87171" text-anchor="middle">dence</text>

  <rect x="914" y="466" width="60" height="30" rx="8" fill="rgba(16,185,129,0.25)"/>
  <text x="944" y="486" font-family="Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="600" fill="#34d399" text-anchor="middle">now</text>
</svg>
